<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welcome — Zion International Pentecostal Church</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --deep: #080c14;
    --dark: #0d1320;
    --white: #ffffff;
    --muted: rgba(255,255,255,0.45);
    --font-display: 'Cormorant Garamond', serif;
    --font-sans: 'Josefin Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    overflow: hidden;
    font-family: var(--font-sans);
    cursor: none;
  }

  /* ── CANVAS GLOBE ── */
  #globeCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── STAR FIELD ── */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
    50%       { opacity: 1; transform: scale(1.5); }
  }

  /* ── INTRO OVERLAY ── */
  .intro-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ── GLOBE CONTAINER ── */
  .globe-wrap {
    position: relative;
    width: 340px;
    height: 340px;
    margin-bottom: 50px;
    animation: globeFloat 4s ease-in-out infinite;
  }

  @keyframes globeFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-18px); }
  }

  .globe-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.25);
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    animation: ringExpand 3s ease-out infinite;
  }

  .globe-ring:nth-child(1) { width: 360px; height: 360px; animation-delay: 0s; }
  .globe-ring:nth-child(2) { width: 420px; height: 420px; animation-delay: 0.6s; }
  .globe-ring:nth-child(3) { width: 480px; height: 480px; animation-delay: 1.2s; }

  @keyframes ringExpand {
    0%   { opacity: 0.6; transform: translate(-50%,-50%) scale(0.95); }
    100% { opacity: 0;   transform: translate(-50%,-50%) scale(1.15); }
  }

  /* Location pins on globe */
  .pin {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.9), 0 0 25px rgba(201,168,76,0.4);
    animation: pinPulse 2s ease-in-out infinite;
    z-index: 5;
  }

  .pin::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.5);
    animation: pinRing 2s ease-out infinite;
  }

  @keyframes pinPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(201,168,76,0.9); }
    50%       { transform: scale(1.3); box-shadow: 0 0 20px rgba(201,168,76,1), 0 0 40px rgba(201,168,76,0.5); }
  }

  @keyframes pinRing {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(3); }
  }

  .pin-label {
    position: absolute;
    left: 14px; top: -4px;
    font-family: var(--font-sans);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--gold);
    white-space: nowrap;
    text-transform: uppercase;
    opacity: 0;
    animation: labelFade 2s ease-in-out infinite;
  }

  @keyframes labelFade {
    0%, 30%, 100% { opacity: 0; }
    60%, 85%       { opacity: 1; }
  }

  /* ── TEXT AREA ── */
  .intro-text { text-align: center; }

  .intro-label {
    font-size: 11px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .intro-label span {
    display: inline-block;
    animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    animation-delay: 0.5s;
    transform: translateY(100%);
  }

  .intro-title {
    font-family: var(--font-display);
    font-size: clamp(42px, 8vw, 88px);
    font-weight: 700;
    color: var(--white);
    line-height: 0.95;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .title-word {
    display: inline-block;
    overflow: hidden;
    margin-right: 0.15em;
  }

  .title-word span {
    display: inline-block;
    animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) both;
    transform: translateY(110%);
  }

  .title-word:nth-child(1) span { animation-delay: 0.7s; }
  .title-word:nth-child(2) span { animation-delay: 0.9s; }
  .title-word:nth-child(3) span { animation-delay: 1.1s; color: var(--gold); }

  @keyframes slideUp {
    to { transform: translateY(0); }
  }

  .intro-sub {
    font-size: clamp(12px, 1.5vw, 15px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 1s ease both;
    animation-delay: 1.5s;
  }

  .live-verse {
    font-family: var(--font-display);
    font-style: italic;
    font-size: clamp(14px, 2vw, 20px);
    color: rgba(255,255,255,0.65);
    max-width: 480px;
    line-height: 1.6;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeIn 1s ease both;
    animation-delay: 1.8s;
  }

  .verse-ref {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s ease both;
    animation-delay: 2s;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ── ENTER BUTTON ── */
  .enter-btn {
    margin-top: 44px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 40px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.5s ease;
    pointer-events: all;
    opacity: 0;
    animation: fadeIn 1s ease both;
    animation-delay: 2.4s;
    position: relative;
    overflow: hidden;
  }

  .enter-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-105%);
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
    z-index: -1;
  }

  .enter-btn:hover::before { transform: translateX(0); }
  .enter-btn:hover { color: var(--deep); }

  /* ── BRANCHES ── */
  .branches-strip {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    gap: 0;
    border-top: 1px solid rgba(201,168,76,0.12);
    background: rgba(8,12,20,0.8);
    backdrop-filter: blur(20px);
    opacity: 0;
    animation: fadeIn 1s ease both;
    animation-delay: 2.6s;
  }

  .branch-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-right: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .branch-label::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--gold);
  }

  .branches-scroll {
    flex: 1;
    overflow: hidden;
    mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  }

  .branches-inner {
    display: flex;
    gap: 48px;
    animation: scrollBranches 20s linear infinite;
    white-space: nowrap;
  }

  .branch-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .branch-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  @keyframes scrollBranches {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── CURSOR ── */
  .cursor {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
  }
  .cursor-dot  { width: 6px; height: 6px; background: var(--gold); margin: -3px 0 0 -3px; }
  .cursor-ring { width: 32px; height: 32px; border: 1px solid rgba(201,168,76,0.6); margin: -16px 0 0 -16px; transition: width 0.3s, height 0.3s, margin 0.3s, opacity 0.3s; }

  /* ── PAGE EXIT ── */
  .page-exit {
    position: fixed;
    inset: 0;
    background: var(--gold);
    z-index: 9000;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.7s cubic-bezier(0.86,0,0.07,1);
  }

  .page-exit.active { transform: scaleX(1); }
</style>
</head>
<body>

<div class="cursor cursor-dot" id="dot"></div>
<div class="cursor cursor-ring" id="ring"></div>
<div class="page-exit" id="pageExit"></div>

<!-- STAR FIELD -->
<div class="stars" id="stars"></div>

<!-- 3D GLOBE CANVAS -->
<canvas id="globeCanvas"></canvas>

<!-- INTRO OVERLAY -->
<div class="intro-overlay">
  <div class="globe-wrap" id="globeWrap">
    <div class="globe-ring"></div>
    <div class="globe-ring"></div>
    <div class="globe-ring"></div>
    <!-- Pins will be injected by JS -->
  </div>

  <div class="intro-text">
    <div class="intro-label"><span>Zion International Pentecostal Church</span></div>
    <h1 class="intro-title">
      <div class="title-word"><span>One</span></div>
      <div class="title-word"><span>Church,</span></div>
      <div class="title-word"><span>World.</span></div>
    </h1>
    <p class="intro-sub">Kampala · London · Toronto · New York · Nairobi · Kigali</p>
    <p class="live-verse">"Go into all the world and preach the gospel<br>to all creation."</p>
    <p class="verse-ref">Mark 16:15</p>
    <a href="index.html" class="enter-btn" id="enterBtn">
      <span>✝</span> Enter the Sanctuary
    </a>
  </div>
</div>

<!-- BRANCHES SCROLLING STRIP -->
<div class="branches-strip">
  <div class="branch-label">Global Branches</div>
  <div class="branches-scroll">
    <div class="branches-inner" id="branchesInner">
      <!-- duplicated for seamless loop -->
    </div>
  </div>
</div>

<script>
// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 200; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  const delay = Math.random() * 6;
  const dur   = 2 + Math.random() * 4;
  const minOp = 0.1 + Math.random() * 0.3;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    --d:${dur}s; --delay:${delay}s; --min-op:${minOp};
  `;
  starsEl.appendChild(s);
}

// ── BRANCHES ──
const branches = [
  'Kampala, Uganda', 'Makindye West', 'London, UK', 'Toronto, Canada',
  'New York, USA', 'Nairobi, Kenya', 'Kigali, Rwanda', 'Dar es Salaam, Tanzania',
  'Johannesburg, SA', 'Lagos, Nigeria', 'Oslo, Norway', 'Stockholm, Sweden',
  'Melbourne, Australia', 'Dubai, UAE', 'Amsterdam, Netherlands', 'Accra, Ghana'
];
const inner = document.getElementById('branchesInner');
const doubled = [...branches, ...branches];
doubled.forEach(b => {
  const d = document.createElement('div');
  d.className = 'branch-item';
  d.innerHTML = `<div class="branch-dot"></div>${b}`;
  inner.appendChild(d);
});

// ── 3D GLOBE (Canvas) ──
const canvas = document.getElementById('globeCanvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, R;
let rot = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  R = Math.min(W, H) * 0.20;
}
resize();
window.addEventListener('resize', resize);

// Approximate continent outlines as lat/lon points
const landMasses = [
  // Africa
  [[-17,14],[-12,14],[-5,10],[3,5],[10,2],[18,-4],[26,-6],[32,-2],[34,5],[36,14],[40,20],
   [42,10],[38,-2],[34,-8],[28,-14],[18,-18],[12,-22],[8,-18],[4,-8],[-2,-4],[-10,2],[-17,8],[-17,14]],
  // Europe
  [[-10,36],[-8,44],[-4,50],[0,52],[8,55],[14,58],[24,60],[28,64],[30,68],[24,65],[18,62],
   [14,54],[18,48],[16,42],[12,44],[8,44],[4,44],[-2,44],[-8,38],[-10,36]],
  // Asia
  [[26,40],[34,36],[36,30],[42,24],[50,22],[60,20],[70,22],[80,28],[88,22],[96,10],[100,2],
   [104,10],[110,18],[118,24],[124,32],[130,38],[132,44],[136,50],[140,54],[144,60],[140,56],
   [134,50],[126,42],[120,36],[114,30],[106,26],[100,32],[94,38],[88,44],[80,46],[72,40],
   [64,36],[56,40],[48,36],[42,36],[36,36],[30,38],[26,40]],
  // North America
  [[-60,44],[-72,44],[-80,42],[-82,44],[-80,46],[-84,46],[-90,42],[-96,30],[-100,22],
   [-96,18],[-88,18],[-80,18],[-80,26],[-84,30],[-80,34],[-76,36],[-72,40],[-70,44],
   [-64,44],[-60,46],[-60,44]],
  // South America
  [[-50,-8],[-46,-8],[-40,-4],[-36,-6],[-36,-10],[-38,-14],[-40,-18],[-44,-22],[-44,-24],
   [-46,-24],[-50,-28],[-52,-34],[-56,-38],[-60,-42],[-64,-42],[-68,-36],[-70,-28],
   [-70,-18],[-66,-10],[-62,-4],[-58,-2],[-52,-2],[-50,-8]],
  // Australia
  [[114,-22],[118,-18],[124,-14],[130,-12],[136,-12],[140,-16],[146,-20],[150,-24],
   [152,-28],[148,-32],[146,-38],[142,-38],[138,-36],[132,-34],[128,-32],[122,-28],[116,-26],[114,-22]]
];

// Cities (lat, lon, name)
const cities = [
  [0.3, 32.6, 'Kampala'],
  [51.5, -0.1, 'London'],
  [43.7, -79.4, 'Toronto'],
  [40.7, -74.0, 'New York'],
  [-1.3, 36.8, 'Nairobi'],
  [-1.9, 30.1, 'Kigali'],
  [-6.8, 39.3, 'Dar es Salaam'],
];

function latLonTo3D(lat, lon, r) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return {
    x: -r * Math.sin(phi) * Math.cos(theta),
    y:  r * Math.cos(phi),
    z:  r * Math.sin(phi) * Math.sin(theta)
  };
}

function project3D(x, y, z, rotY) {
  const cosR = Math.cos(rotY), sinR = Math.sin(rotY);
  const rx = x * cosR + z * sinR;
  const rz = -x * sinR + z * cosR;
  const tiltAngle = 0.35;
  const cosT = Math.cos(tiltAngle), sinT = Math.sin(tiltAngle);
  const ry = y * cosT - rz * sinT;
  const rz2 = y * sinT + rz * cosT;
  const perspective = 1200;
  const scale = perspective / (perspective + rz2 + R * 1.5);
  return { sx: cx + rx * scale, sy: cy + ry * scale, z: rz2, visible: rz2 < R * 0.8 };
}

function drawGlobe(timestamp) {
  ctx.clearRect(0, 0, W, H);
  rot += 0.0025;

  // Glow bg
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 1.8);
  grd.addColorStop(0,   'rgba(201,168,76,0.06)');
  grd.addColorStop(0.5, 'rgba(8,20,50,0.12)');
  grd.addColorStop(1,   'rgba(8,12,20,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Globe sphere
  const sphereGrd = ctx.createRadialGradient(cx - R*0.25, cy - R*0.3, R*0.05, cx, cy, R);
  sphereGrd.addColorStop(0,   'rgba(15,30,70,0.9)');
  sphereGrd.addColorStop(0.5, 'rgba(8,18,45,0.85)');
  sphereGrd.addColorStop(1,   'rgba(5,10,28,0.95)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = sphereGrd;
  ctx.fill();

  // Globe border glow
  const borderGrd = ctx.createRadialGradient(cx, cy, R*0.9, cx, cy, R*1.05);
  borderGrd.addColorStop(0,   'rgba(201,168,76,0)');
  borderGrd.addColorStop(0.5, 'rgba(201,168,76,0.3)');
  borderGrd.addColorStop(1,   'rgba(201,168,76,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = borderGrd;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Latitude lines
  ctx.strokeStyle = 'rgba(201,168,76,0.06)';
  ctx.lineWidth = 0.5;
  for (let lat = -80; lat <= 80; lat += 20) {
    ctx.beginPath();
    let first = true;
    for (let lon = -180; lon <= 180; lon += 3) {
      const p3 = latLonTo3D(lat, lon, R * 0.99);
      const proj = project3D(p3.x, p3.y, p3.z, rot);
      if (!proj.visible) { first = true; continue; }
      if (first) { ctx.moveTo(proj.sx, proj.sy); first = false; }
      else ctx.lineTo(proj.sx, proj.sy);
    }
    ctx.stroke();
  }

  // Longitude lines
  for (let lon = -180; lon <= 180; lon += 30) {
    ctx.beginPath();
    let first = true;
    for (let lat = -90; lat <= 90; lat += 3) {
      const p3 = latLonTo3D(lat, lon, R * 0.99);
      const proj = project3D(p3.x, p3.y, p3.z, rot);
      if (!proj.visible) { first = true; continue; }
      if (first) { ctx.moveTo(proj.sx, proj.sy); first = false; }
      else ctx.lineTo(proj.sx, proj.sy);
    }
    ctx.stroke();
  }

  // Land masses
  landMasses.forEach(land => {
    ctx.beginPath();
    let started = false;
    land.forEach(([lon, lat]) => {
      const p3 = latLonTo3D(lat, lon, R * 1.002);
      const proj = project3D(p3.x, p3.y, p3.z, rot);
      if (!proj.visible) return;
      if (!started) { ctx.moveTo(proj.sx, proj.sy); started = true; }
      else ctx.lineTo(proj.sx, proj.sy);
    });
    if (started) {
      ctx.closePath();
      ctx.fillStyle = 'rgba(201,168,76,0.12)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(201,168,76,0.35)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  });

  // City dots + halos
  cities.forEach(([lat, lon, name]) => {
    const p3 = latLonTo3D(lat, lon, R * 1.015);
    const proj = project3D(p3.x, p3.y, p3.z, rot);
    if (!proj.visible) return;

    const pulse = 0.5 + 0.5 * Math.sin(timestamp * 0.003 + lat);

    // Halo
    ctx.beginPath();
    ctx.arc(proj.sx, proj.sy, 10 + pulse * 8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${0.05 + pulse * 0.08})`;
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(proj.sx, proj.sy, 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${0.7 + pulse * 0.3})`;
    ctx.fill();

    // Label
    ctx.font = '700 10px "Josefin Sans", sans-serif';
    ctx.fillStyle = `rgba(232,201,106,${0.5 + pulse * 0.5})`;
    ctx.fillText(name.toUpperCase(), proj.sx + 8, proj.sy + 4);
  });

  // Atmosphere glow
  const atmoGrd = ctx.createRadialGradient(cx, cy, R * 0.92, cx, cy, R * 1.12);
  atmoGrd.addColorStop(0, 'rgba(201,168,76,0)');
  atmoGrd.addColorStop(0.5, 'rgba(100,140,255,0.05)');
  atmoGrd.addColorStop(1, 'rgba(100,140,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R * 1.12, 0, Math.PI * 2);
  ctx.fillStyle = atmoGrd;
  ctx.fill();

  // Highlight
  const hiGrd = ctx.createRadialGradient(cx - R*0.3, cy - R*0.35, 0, cx - R*0.3, cy - R*0.35, R * 0.6);
  hiGrd.addColorStop(0, 'rgba(255,255,255,0.07)');
  hiGrd.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = hiGrd;
  ctx.fill();

  requestAnimationFrame(drawGlobe);
}
requestAnimationFrame(drawGlobe);

// ── CURSOR ──
const dot = document.getElementById('dot');
const ring = document.getElementById('ring');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left  = mx + 'px';
  dot.style.top   = my + 'px';
});

(function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
})();

// ── ENTER BUTTON ──
document.getElementById('enterBtn').addEventListener('click', function(e) {
  e.preventDefault();
  const exit = document.getElementById('pageExit');
  exit.classList.add('active');
  setTimeout(() => { window.location.href = 'index.html'; }, 700);
});
</script>
